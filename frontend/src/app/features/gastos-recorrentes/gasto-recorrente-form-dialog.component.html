<h2 mat-dialog-title>Novo Gasto Recorrente</h2>

<form [formGroup]="form" (ngSubmit)="salvar()">
  <mat-dialog-content class="app-form-dialog">
    <mat-form-field appearance="outline" class="app-form-field">
      <mat-label>Categoria</mat-label>
      <mat-select formControlName="categoriaId">
        <mat-option *ngFor="let categoria of categorias" [value]="categoria.id">{{ categoria.nome }}</mat-option>
      </mat-select>
      <mat-error *ngIf="form.controls.categoriaId.hasError('required')">Selecione a categoria</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="app-form-field">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="nome" maxlength="100" placeholder="Ex: Aluguel, Internet" />
      <mat-error *ngIf="form.controls.nome.hasError('required')">Informe o nome</mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close>Cancelar</button>
    <button mat-flat-button color="primary" type="submit">Salvar</button>
  </mat-dialog-actions>
</form>
