<h2 mat-dialog-title>Lançamentos — {{ data.gastoRecorrente.nome }}</h2>

<mat-dialog-content class="app-lancamentos-dialog">
  <form [formGroup]="form" (ngSubmit)="salvar()" class="app-lancamento-form">
    <app-mes-ano-picker formControlName="mesReferencia"></app-mes-ano-picker>

    <mat-form-field appearance="outline">
      <mat-label>Valor</mat-label>
      <span matTextPrefix>R$&nbsp;</span>
      <input matInput type="number" step="0.01" min="0.01" formControlName="valor" />
    </mat-form-field>

    <button mat-flat-button color="primary" type="submit">
      <mat-icon>{{ editandoId ? 'save' : 'add' }}</mat-icon>
      {{ editandoId ? 'Salvar' : 'Gerar' }}
    </button>

    <button mat-button type="button" *ngIf="editandoId" (click)="cancelarEdicao()">Cancelar</button>
  </form>

  <div class="app-loading" *ngIf="carregando">
    <mat-spinner diameter="32"></mat-spinner>
  </div>

  <div class="app-empty-state" *ngIf="!carregando && lancamentos.length === 0">
    <mat-icon>event_busy</mat-icon>
    <span>Nenhum lançamento gerado ainda.</span>
  </div>

  <table mat-table [dataSource]="lancamentos" class="app-table" *ngIf="!carregando && lancamentos.length > 0">
    <ng-container matColumnDef="mesReferencia">
      <th mat-header-cell *matHeaderCellDef>Mês</th>
      <td mat-cell *matCellDef="let lancamento">{{ formatarMesReferencia(lancamento.mesReferencia) }}</td>
    </ng-container>

    <ng-container matColumnDef="valor">
      <th mat-header-cell *matHeaderCellDef>Valor</th>
      <td mat-cell *matCellDef="let lancamento">{{ lancamento.valor | currency: 'BRL' }}</td>
    </ng-container>

    <ng-container matColumnDef="pago">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let lancamento">
        <mat-chip-set>
          <mat-chip [class]="lancamento.pago ? 'app-chip--quitado' : 'app-chip--pendente'">
            {{ lancamento.pago ? 'Pago' : 'Pendente' }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef class="app-col-acoes">Ações</th>
      <td mat-cell *matCellDef="let lancamento" class="app-col-acoes">
        <button
          mat-icon-button
          matTooltip="Marcar como pago"
          *ngIf="!lancamento.pago"
          (click)="marcarComoPago(lancamento)"
        >
          <mat-icon>task_alt</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Editar" (click)="editar(lancamento)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Duplicar para outros meses" (click)="duplicar(lancamento)">
          <mat-icon>content_copy</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Excluir" (click)="excluir(lancamento)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Fechar</button>
</mat-dialog-actions>
