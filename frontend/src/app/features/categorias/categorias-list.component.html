<div class="app-page-header">
  <h1>Categorias</h1>
  <button mat-flat-button color="primary" (click)="novo()">
    <mat-icon>add</mat-icon>
    Nova Categoria
  </button>
</div>

<div class="app-loading" *ngIf="carregando">
  <mat-spinner diameter="40"></mat-spinner>
</div>

<div class="app-empty-state" *ngIf="!carregando && categorias.length === 0">
  <mat-icon>sell</mat-icon>
  <span>Nenhuma categoria cadastrada ainda.</span>
</div>

<table mat-table [dataSource]="categorias" class="app-table mat-elevation-z1" *ngIf="!carregando && categorias.length > 0">
  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let categoria">{{ categoria.nome }}</td>
  </ng-container>

  <ng-container matColumnDef="tipo">
    <th mat-header-cell *matHeaderCellDef>Tipo</th>
    <td mat-cell *matCellDef="let categoria">
      {{ categoria.tipo === 'DESPESA' ? 'Despesa' : 'Receita' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef class="app-col-acoes">Ações</th>
    <td mat-cell *matCellDef="let categoria" class="app-col-acoes">
      <button mat-icon-button matTooltip="Editar" (click)="editar(categoria)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Excluir" (click)="excluir(categoria)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
