<h2 mat-dialog-title>{{ editando ? 'Editar Cartão' : 'Novo Cartão' }}</h2>

<form [formGroup]="form" (ngSubmit)="salvar()">
  <mat-dialog-content class="app-form-dialog">
    <mat-form-field appearance="outline" class="app-form-field">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="nome" maxlength="100" />
      <mat-error *ngIf="form.controls.nome.hasError('required')">Informe o nome</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="app-form-field">
      <mat-label>Bandeira</mat-label>
      <input matInput formControlName="bandeira" maxlength="50" placeholder="Ex: Visa, Mastercard" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="app-form-field">
      <mat-label>Dia de fechamento</mat-label>
      <input matInput type="number" formControlName="diaFechamento" min="1" max="31" />
      <mat-error *ngIf="form.controls.diaFechamento.hasError('required')">Informe o dia de fechamento</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="app-form-field">
      <mat-label>Dia de vencimento</mat-label>
      <input matInput type="number" formControlName="diaVencimento" min="1" max="31" />
      <mat-error *ngIf="form.controls.diaVencimento.hasError('required')">Informe o dia de vencimento</mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" mat-dialog-close>Cancelar</button>
    <button mat-flat-button color="primary" type="submit">Salvar</button>
  </mat-dialog-actions>
</form>
