<div class="app-page-header">
  <h1>Receitas — {{ mesFormatado }}</h1>
  <div class="app-page-header__actions">
    <app-mes-ano-picker [(ngModel)]="mesSelecionado" (ngModelChange)="onMesChange()"></app-mes-ano-picker>
    <button mat-flat-button color="primary" (click)="novo()">
      <mat-icon>add</mat-icon>
      Nova Receita
    </button>
  </div>
</div>

<div class="app-loading" *ngIf="carregando">
  <mat-spinner diameter="40"></mat-spinner>
</div>

<div class="app-empty-state" *ngIf="!carregando && receitas.length === 0">
  <mat-icon>payments</mat-icon>
  <span>Nenhuma receita em {{ mesFormatado }}.</span>
</div>

<table mat-table [dataSource]="receitas" class="app-table mat-elevation-z1" *ngIf="!carregando && receitas.length > 0">
  <ng-container matColumnDef="descricao">
    <th mat-header-cell *matHeaderCellDef>Descrição</th>
    <td mat-cell *matCellDef="let receita">{{ receita.descricao }}</td>
  </ng-container>

  <ng-container matColumnDef="categoriaNome">
    <th mat-header-cell *matHeaderCellDef>Categoria</th>
    <td mat-cell *matCellDef="let receita">{{ receita.categoriaNome }}</td>
  </ng-container>

  <ng-container matColumnDef="mesReferencia">
    <th mat-header-cell *matHeaderCellDef>Mês</th>
    <td mat-cell *matCellDef="let receita">{{ formatarMesReferencia(receita.mesReferencia) }}</td>
  </ng-container>

  <ng-container matColumnDef="valor">
    <th mat-header-cell *matHeaderCellDef>Valor</th>
    <td mat-cell *matCellDef="let receita">{{ receita.valor | currency: 'BRL' }}</td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef class="app-col-acoes">Ações</th>
    <td mat-cell *matCellDef="let receita" class="app-col-acoes">
      <button mat-icon-button matTooltip="Editar" (click)="editar(receita)">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Duplicar para outros meses" (click)="duplicar(receita)">
        <mat-icon>content_copy</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Excluir" (click)="excluir(receita)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
