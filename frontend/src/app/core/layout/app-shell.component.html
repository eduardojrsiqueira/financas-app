<mat-sidenav-container class="app-shell">
  <mat-sidenav
    #sidenav
    class="app-sidenav"
    [mode]="isHandset ? 'over' : 'side'"
    [opened]="!isHandset"
  >
    <div class="app-brand">
      <mat-icon>account_balance_wallet</mat-icon>
      <span>Finanças</span>
    </div>
    <mat-nav-list>
      <a
        *ngFor="let item of menu"
        mat-list-item
        [routerLink]="item.rota"
        routerLinkActive="app-nav-link--active"
        (click)="isHandset && sidenav.close()"
      >
        <mat-icon matListItemIcon>{{ item.icone }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Alternar menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="app-toolbar__title">Finanças App</span>
      <span class="app-toolbar__spacer"></span>
      <span class="app-toolbar__usuario" *ngIf="usuario() as u">Olá, {{ u.nome }}</span>
      <button mat-icon-button routerLink="/perfil" matTooltip="Meu perfil" aria-label="Meu perfil">
        <mat-icon>account_circle</mat-icon>
      </button>
      <button mat-icon-button (click)="sair()" matTooltip="Sair" aria-label="Sair">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>
    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
