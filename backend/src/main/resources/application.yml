server:
  port: 8080

spring:
  application:
    name: financas-app

  datasource:
    url: jdbc:mysql://localhost:3306/financas?serverTimezone=America/Sao_Paulo
    username: financas
    password: financas
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  web:
    resources:
      static-locations: classpath:/static/

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# Fallback para rotas do Angular (SPA) tratado via SpaController.java
